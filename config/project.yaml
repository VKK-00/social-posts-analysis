project_name: social_posts_analysis_template

source:
  platform: "facebook"
  url: "https://www.facebook.com/example-public-page/"
  source_id: null
  source_name: "Example Public Page"
  telegram:
    discussion_chat_id: null

date_range:
  start: null
  end: null

collector:
  mode: "web"
  multi_pass_runs: 1
  wait_between_passes_seconds: 0
  meta_api:
    enabled: false
    api_version: "v25.0"
    base_url: "https://graph.facebook.com"
    access_token: null
    page_size: 25
    timeout_seconds: 30
    max_retries: 3
  public_web:
    enabled: true
    headless: true
    browser_channel: null
    max_scrolls: 8
    wait_after_scroll_ms: 1500
    timeout_seconds: 30
    authenticated_browser:
      enabled: false
      browser: "chrome"
      user_data_dir: null
      profile_directory: "Default"
      copy_profile: true
      temp_root_dir: null
  telegram_web:
    enabled: false
    headless: true
    browser_channel: null
    max_scrolls: 6
    wait_after_scroll_ms: 1200
    timeout_seconds: 30
  telegram_mtproto:
    enabled: false
    session_file: null
    api_id: null
    api_hash: null
    page_size: 100
    timeout_seconds: 30
    max_retries: 3
  telegram_bot_api:
    enabled: false
    base_url: "https://api.telegram.org"
    bot_token: null
    update_limit: 100
    timeout_seconds: 30
    max_retries: 3
    consume_updates: false
    offset: null
  x_api:
    enabled: false
    base_url: "https://api.x.com/2"
    bearer_token: null
    page_size: 100
    timeout_seconds: 30
    max_retries: 3
    search_scope: "recent"
  x_web:
    enabled: false
    headless: true
    browser_channel: null
    max_scrolls: 8
    wait_after_scroll_ms: 1500
    timeout_seconds: 30
    authenticated_browser:
      enabled: false
      browser: "chrome"
      user_data_dir: null
      profile_directory: "Default"
      copy_profile: true
      temp_root_dir: null

sides:
  - side_id: "example_actor"
    name: "Example Actor"
    aliases: ["Actor Example", "Example Side"]
    support_keywords: ["support example actor", "stand with example actor"]
    oppose_keywords: ["oppose example actor", "against example actor"]

analysis:
  languages: ["ru", "uk", "en"]
  min_cluster_size: 2
  min_samples: 1
  exemplar_count: 3
  batch_size: 25
  max_items_per_item_type: null

normalization:
  merge_recent_runs: 1
  source_run_ids: []

providers:
  embeddings:
    kind: "auto"
    base_url: null
    api_key: null
    model: "text-embedding-3-small"
    dimension: 256
    timeout_seconds: 45
  llm:
    kind: "auto"
    base_url: null
    api_key: null
    model: "gpt-4o-mini"
    temperature: 0
    timeout_seconds: 60

paths:
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  review_dir: "review"
  reports_dir: "reports"
  database_path: "data/processed/social_posts_analysis.duckdb"
